services:
  postgres:
    image: postgres:16
    build:
      context: .
      dockerfile: Dockerfile    # ← use custom image
    container_name: postgres
    restart: unless-stopped
    environment:
      - VAULT_ADDR=http://vault-server:8200    # ← vault-server DNS confirmed ✅
      - VAULT_TOKEN=${VAULT_TOKEN}
      - VAULT_SECRET_PATH=secret/data/postgres
      - PGDATA=/var/lib/postgresql/data/pgdata   # ← must match volume path
      - PGUSER=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data/pgdata
      - ./start-postgres.sh:/start-postgres.sh
    command: ["bash", "/start-postgres.sh"]
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - vault-network       # ← join vault-network ✅
      - postgres-network

volumes:
  postgres-data:
    name: postgres-data

networks:
  vault-network:
    external: true
    name: vault-network     # ← exact name from diagnostic ✅

  postgres-network:
    name: postgres-network
    driver: bridge